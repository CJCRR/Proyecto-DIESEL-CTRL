<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras - Nexa CTRL</title>
    <link rel="icon" href="/img/nexa3.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>

<body class="bg-slate-50 min-h-screen text-slate-900 flex flex-col">
    <main class="flex-1 container mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section class="lg:col-span-7 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-4">
            <div class="flex items-center justify-between gap-2 mb-2">
                <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest">Nueva compra / ingreso</h2>
                <button id="btnNuevaCompra"
                    class="text-xs px-3 py-2 rounded-full bg-slate-100 text-slate-700 hover:bg-slate-200 flex items-center gap-2">
                    <i class="fas fa-eraser"></i><span>Limpiar</span>
                </button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                <div>
                    <label class="text-[11px] font-semibold text-slate-500"></label>
                    <select id="c_proveedor"
						class="w-full select-pos text-sm"></select>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-500"></label>
                        <div class="inv-input-group">
                            <input id="c_fecha" type="date" class="inv-input" placeholder=" " />
                            <label for="c_fecha" class="inv-label">Fecha</label>
                        </div>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-500"></label>
                        <div class="inv-input-group">
                            <input id="c_numero" class="inv-input" placeholder=" " />
                            <label for="c_numero" class="inv-label">Número / Ref.</label>
                        </div>
                </div>
            </div>
            <div class="grid grid-cols-1 gap-3 mb-4">
                <div>
                    <div class="flex items-center justify-between">
                        <label class="text-[11px] font-semibold text-slate-500"></label>
                        <button id="btnNuevoProducto" type="button"
                            class="text-[11px] font-semibold text-blue-600 hover:text-blue-700 flex items-center gap-1">
                            <i class="fas fa-plus-circle"></i>
                            <span>Nuevo producto</span>
                        </button>
                    </div>
                        <div class="inv-input-group">
                            <input id="c_codigo" autocomplete="off" class="inv-input" placeholder=" " />
                            <label for="c_codigo" class="inv-label">Código o nombre</label>
                            <ul id="c_sugerencias"
    								class="absolute left-0 right-0 mt-1 border rounded-xl hidden bg-white shadow-2xl max-h-60 overflow-y-auto z-50 text-sm">
                            </ul>
                        </div>
                    <div id="c_producto_info" class="mt-1 text-[11px] text-slate-500 min-h-[1.5rem]"></div>
                </div>

            </div>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3 mb-4">
                <div>
                    <label class="text-[11px] font-semibold text-slate-500"></label>
                        <div class="inv-input-group">
                            <input id="c_tasa" type="number" step="0.01" class="inv-input" placeholder=" " />
                            <label for="c_tasa" class="inv-label">Tasa BCV</label>
                        </div>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-500"></label>
                        <div class="inv-input-group">
                            <input id="c_cantidad" type="number" class="inv-input" placeholder=" " />
                            <label for="c_cantidad" class="inv-label">Cantidad</label>
                        </div>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-500"></label>
                        <div class="inv-input-group">
                            <input id="c_costo" type="number" step="0.01" class="inv-input" placeholder=" " />
                            <label for="c_costo" class="inv-label">Costo USD</label>
                        </div>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-500"></label>
                        <div class="inv-input-group">
                            <input id="c_precio" type="number" step="0.01" class="inv-input" placeholder=" " />
                            <label for="c_precio" class="inv-label">Precio USD</label>
                        </div>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-500"></label>
                        <div class="inv-input-group">
                            <input id="c_lote" class="inv-input" placeholder=" " />
                            <label for="c_lote" class="inv-label">Marca (opcional)</label>
                        </div>
                </div>
            </div>
            <div class="flex justify-end mb-4">
                <button id="btnAgregarItemCompra"
                    class="px-4 py-2 rounded-full bg-blue-600 text-white text-sm font-bold hover:bg-blue-700 flex items-center gap-2">
                    <i class="fas fa-plus"></i><span>Agregar item</span>
                </button>
            </div>
            <div class="overflow-auto max-h-[50vh] border rounded-xl mb-4">
                <table class="w-full text-sm">
                    <thead class="bg-slate-100 text-[11px] uppercase text-slate-500">
                        <tr>
                            <th class="p-2 text-left">Código</th>
                            <th class="p-2 text-left">Descripción</th>
                            <th class="p-2 text-left">Marca</th>
                            <th class="p-2 text-right">Cant.</th>
                            <th class="p-2 text-right">Costo USD</th>
                            <th class="p-2 text-right">Subtotal USD</th>
                            <th class="p-2 text-right">Subtotal Bs</th>
                            <th class="p-2 text-left">Lote</th>
                            <th class="p-2"></th>
                        </tr>
                    </thead>
                    <tbody id="c_items" class="divide-y"></tbody>
                </table>
            </div>
            <div class="flex items-center justify-between">
                <div class="text-xs text-slate-500" id="c_resumen"></div>
                <button id="btnGuardarCompra"
                    class="px-5 py-3 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-700 flex items-center gap-2 text-sm">
                    <i class="fas fa-save"></i><span>Registrar compra</span>
                </button>
            </div>
        </section>

        <section class="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-4">
                <div class="flex items-center justify-between gap-2">
                <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest">Historial de compras</h2>
				<select id="c_filtro_proveedor" class="select-pos text-sm min-w-[180px]"></select>
            </div>
            <div class="overflow-auto max-h-[70vh] border rounded-xl">
                <table class="w-full text-sm">
                    <thead class="bg-slate-100 text-[11px] uppercase text-slate-500">
                        <tr>
                            <th class="p-2 text-left">Fecha</th>
                            <th class="p-2 text-left">Proveedor</th>
                            <th class="p-2 text-right">Total USD</th>
                            <th class="p-2 text-right">Total Bs</th>
                        </tr>
                    </thead>
                    <tbody id="c_historial" class="divide-y"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal: Nuevo producto -->
    <div id="modal-nuevo-producto"
        class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-5">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-black text-slate-600 uppercase tracking-widest">Nuevo producto</h3>
                <button id="modal-nuevo-producto-cerrar"
                    class="h-8 w-8 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-500">
                    <i class="fas fa-xmark"></i>
                </button>
            </div>
            <form id="formNuevoProducto" class="space-y-3 text-sm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="text-[11px] font-semibold text-slate-500"></label>
                            <div class="inv-input-group">
                                <input id="np_codigo" class="inv-input" placeholder=" " required />
                                <label for="np_codigo" class="inv-label">Código interno</label>
                            </div>
                    </div>
                    <div>
                        <label class="text-[11px] font-semibold text-slate-500"></label>
                            <div class="inv-input-group">
                                <input id="np_marca" class="inv-input" placeholder=" " />
                                <label for="np_marca" class="inv-label">Marca (opcional)</label>
                            </div>
                    </div>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-500"></label>
                        <div class="inv-input-group">
                            <input id="np_descripcion" class="inv-input" placeholder=" " required />
                            <label for="np_descripcion" class="inv-label">Nombre del producto</label>
                        </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div>
                        <label class="text-[11px] font-semibold text-slate-500"></label>
                            <div class="inv-input-group">
                                <input id="np_precio" type="number" step="0.01" class="inv-input" placeholder=" " required />
                                <label for="np_precio" class="inv-label">Precio USD</label>
                            </div>
                    </div>
                    <div>
                        <label class="text-[11px] font-semibold text-slate-500"></label>
                            <div class="inv-input-group">
                                <input id="np_costo" type="number" step="0.01" class="inv-input" placeholder=" " />
                                <label for="np_costo" class="inv-label">Costo USD</label>
                            </div>
                    </div>
                    <div>
                        <label class="text-[11px] font-semibold text-slate-500"></label>
                            <div class="inv-input-group">
                                <input id="np_stock" type="number" class="inv-input" placeholder=" " value="0" />
                                <label for="np_stock" class="inv-label">Stock inicial</label>
                            </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="relative">
                        <label class="text-[11px] font-semibold text-slate-500"></label>
                            <div class="inv-input-group">
                                <input id="np_categoria" class="inv-input" placeholder=" " autocomplete="off" />
                                <label for="np_categoria" class="inv-label">Categoría (opcional)</label>
                            </div>
                        <ul id="npCategoriaSug" class="compras-cat-suggestions hidden"></ul>
                        <datalist id="npCategoriaOptions"></datalist>
                    </div>
                    <div>
                        <label class="text-[11px] font-semibold text-slate-500"></label>
                        <select id="np_deposito"
                            class="w-full p-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">(Elegir Depósito)</option>
                        </select>
                    </div>
                </div>
                <div class="flex items-center justify-between pt-2">
                    <p id="modal-nuevo-producto-msg" class="text-[11px] text-slate-500"></p>
                    <div class="flex gap-2">
                        <button type="button" id="modal-nuevo-producto-cancelar"
                            class="px-4 py-2 rounded-full text-sm bg-slate-100 text-slate-700 hover:bg-slate-200">Cancelar</button>
                        <button type="submit"
                            class="px-4 py-2 rounded-full text-sm bg-blue-600 text-white font-semibold hover:bg-blue-700 flex items-center gap-2">
                            <i class="fas fa-save"></i>
                            <span>Guardar producto</span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="fixed right-4 bottom-4 space-y-2 z-50"></div>
    <script type="module" src="/js/auth-guard.js"></script>
    <script type="module" src="/js/theme.js"></script>
    <script src="/js/layout-shell.js"></script>
    <script type="module" src="/js/alerts.js"></script>
    <script type="module" src="/js/compras.js"></script>
    <script src="/js/layout-nav.js"></script>
    <script src="/js/drawer.js"></script>
</body>

</html>
