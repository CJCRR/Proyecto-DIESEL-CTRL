<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores - Nexa CTRL</title>
    <link rel="icon" href="/img/nexa3.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
    <script src="/js/disable-autocomplete.js"></script>
</head>

<body class="bg-slate-50 min-h-screen text-slate-900 flex flex-col">
    <nav
        class="bg-gradient-to-r from-slate-900 via-slate-900 to-slate-800 text-white shadow-lg shadow-slate-900/40 border-b border-slate-800/60">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <button id="btn-menu"
                    class="h-11 w-11 rounded-2xl bg-white/5 hover:bg-white/10 transition flex items-center justify-center text-white shadow-lg shadow-black/40 ring-1 ring-white/10">
                    <label class="burger" for="nav-burger">
                        <input type="checkbox" id="nav-burger" />
                        <span></span>
                        <span></span>
                        <span></span>
                    </label>
                </button>
                <div class="flex items-center gap-3">
                    <div
                        class="h-10 w-10 rounded-2xl bg-blue-500/15 flex items-center justify-center ring-1 ring-blue-400/40 shadow-md shadow-blue-900/40">
                        <i class="fas fa-people-carry-box text-lg text-blue-400"></i>
                    </div>
                    <div>
                        <h1 id="brand-main-title" class="text-base sm:text-lg font-extrabold tracking-tight">NEXA <span
                                class="text-blue-400">CTRL</span></h1>
                        <p
                            class="hidden sm:block text-[11px] uppercase tracking-[0.2em] text-slate-300/80 font-semibold">
                            Proveedores</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="app-session-status"
                    class="hidden sm:inline-flex items-center gap-2 px-3 py-1 rounded-full border border-slate-600/60 bg-slate-900/60 text-[11px] font-medium text-slate-100">
                    <span id="app-session-status-dot"
                        class="h-2.5 w-2.5 rounded-full bg-emerald-400 shadow-inner"></span>
                    <span id="app-session-status-text">Sesión activa</span>
                </div>
                <a href="/ajustes" title="Ajustes"
                    class="admin-only-gear h-9 w-9 rounded-full bg-white/5 hover:bg-white/10 transition flex items-center justify-center text-white shadow-md shadow-black/40 border border-white/10">
                    <i class="fas fa-gear text-sm"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- Drawer de navegación -->
    <div id="drawer-backdrop" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-40"></div>
    <aside id="drawer"
        class="fixed inset-y-0 left-0 w-72 max-w-[80vw] bg-white shadow-2xl shadow-black/30 -translate-x-full transition-transform duration-200 z-50 flex flex-col">
        <div class="p-5 flex items-center justify-between border-b border-slate-100">
            <div>
                <p class="text-xs uppercase font-black text-slate-400 tracking-widest">Navegación</p>
                <p id="drawer-app-name" class="text-lg font-black text-slate-800">Nexa CTRL</p>
            </div>
            <button id="drawer-close"
                class="h-9 w-9 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 transition">
                <i class="fas fa-xmark text-slate-500"></i>
            </button>
        </div>
        <nav class="flex-1 p-4 space-y-2 text-sm font-semibold text-slate-700"><!-- nav generado por layout-nav.js -->
        </nav>
        <div class="p-4 border-t border-slate-100 text-xs text-slate-500">
            <p class="font-semibold">Atajos rápidos</p>
            <p class="mt-1">Presione ESC para cerrar.</p>
        </div>
    </aside>

    <main class="flex-1 container mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section id="proveedores-form"
            class="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-4">
            <div class="flex items-center justify-between gap-2 mb-1">
                <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest">Proveedor</h2>
                <button id="btnProveedoresTour" type="button"
                    class="text-[11px] font-semibold text-slate-500 hover:text-slate-800 inline-flex items-center gap-1">
                    <i class="fas fa-circle-question text-slate-400"></i>
                    <span>Guía rápida de proveedores</span>
                </button>
            </div>
            <div class="space-y-3">
                <div class="inv-input-group">
                    <input id="p_nombre" class="inv-input font-bold" placeholder=" " />
                    <label for="p_nombre" class="inv-label">Nombre</label>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="inv-input-group">
                        <input id="p_rif" class="inv-input" placeholder=" " />
                        <label for="p_rif" class="inv-label">RIF</label>
                    </div>
                    <div class="inv-input-group">
                        <input id="p_telefono" class="inv-input" placeholder=" " />
                        <label for="p_telefono" class="inv-label">Teléfono</label>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="inv-input-group">
                        <input id="p_email" class="inv-input" placeholder=" " />
                        <label for="p_email" class="inv-label">Email</label>
                    </div>
                    <div>
                        <label class="text-[11px] font-semibold text-slate-500"></label>
                        <select id="p_activo" class="w-full select-pos text-sm">
                            <option value="1">Activo (Sí)</option>
                            <option value="0">Activo (No)</option>
                        </select>
                    </div>
                </div>
                <div class="inv-input-group">
                    <textarea id="p_direccion" class="inv-input" rows="2" placeholder=" "></textarea>
                    <label for="p_direccion" class="inv-label">Dirección fiscal, ciudad, etc.</label>
                </div>
                <div class="inv-input-group">
                    <textarea id="p_notas" class="inv-input" rows="3" placeholder=" "></textarea>
                    <label for="p_notas" class="inv-label">Observaciones, condiciones, marcas que maneja, etc.</label>
                </div>
                <div class="flex gap-2">
                    <button id="btnGuardarProveedor"
                        class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 transition-colors">
                        <i class="fas fa-save mr-2"></i>Guardar / Actualizar
                    </button>
                    <button id="btnNuevoProveedor"
                        class="bg-slate-100 text-slate-700 p-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">
                        <i class="fas fa-eraser mr-2"></i>Nuevo
                    </button>
                </div>
            </div>
        </section>

        <section id="proveedores-lista"
            class="lg:col-span-7 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-4">
            <div id="proveedores-lista-header" class="flex items-center justify-between gap-2">
                <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest">Listado de proveedores</h2>
                <input id="p_buscar" placeholder="Buscar por nombre o RIF"
                    class="flex-1 p-2 border rounded-lg text-sm" />
            </div>
            <div id="proveedores-tabla-wrapper" class="overflow-auto max-h-[70vh] border rounded-xl">
                <table class="w-full text-sm">
                    <thead class="bg-slate-100 text-[11px] uppercase text-slate-500">
                        <tr>
                            <th class="p-3 text-left">Nombre</th>
                            <th class="p-3 text-left">RIF</th>
                            <th class="p-3 text-left">Teléfono</th>
                            <th class="p-3 text-left">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="p_tabla" class="divide-y"></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="border-t border-slate-200 mt-8 py-4 text-xs text-slate-400">
        <div class="container mx-auto px-4 relative flex items-center justify-center">
            <p id="global-footer-branding" class="text-center">© 2026 Nexa CTRL. Sistema de gestión de ventas.</p>
            <p class="hidden sm:block absolute right-0 text-right">
                <a href="/terminos" class="hover:underline">Términos y Condiciones</a>
                <span class="mx-1">·</span>
                <a href="/terminos" class="hover:underline">Política de Privacidad</a>
            </p>
        </div>
    </footer>

    <div id="toast" class="fixed right-4 bottom-4 space-y-2 z-50"></div>
    <script src="/js/guided-tour.js"></script>
    <script type="module" src="/js/auth-guard.js"></script>
    <script type="module" src="/js/theme.js"></script>
    <script type="module" src="/js/alerts.js"></script>
    <script type="module" src="/js/proveedores.js"></script>
    <script src="/js/layout-nav.js"></script>
    <script src="/js/drawer.js"></script>
</body>

</html>
