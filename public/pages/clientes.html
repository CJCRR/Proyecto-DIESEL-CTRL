<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - Diesel Ctrl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>

<body class="bg-slate-50 min-h-screen text-slate-900">
    <nav class="bg-slate-900 text-white p-4 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button id="btn-menu"
                    class="h-11 w-11 rounded-xl bg-white/10 hover:bg-white/15 transition flex items-center justify-center text-white shadow-lg shadow-black/20">
                    <label class="burger" for="nav-burger">
                        <input type="checkbox" id="nav-burger" />
                        <span></span>
                        <span></span>
                        <span></span>
                    </label>
                </button>
                <h1 id="brand-main-title" class="text-xl font-bold tracking-titter italic">DIESEL <span class="text-blue-500">CTRL</span>
                </h1>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-[10px] font-black uppercase tracking-widest opacity-50">Gestión de Clientes</div>
                <a href="/ajustes" title="Ajustes"
                    class="admin-only-gear h-9 w-9 rounded-lg bg-white/10 hover:bg-white/15 transition flex items-center justify-center text-white shadow-lg shadow-black/20">
                    <i class="fas fa-gear text-base"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- Drawer de navegación -->
    <div id="drawer-backdrop" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-40"></div>
    <aside id="drawer"
        class="fixed inset-y-0 left-0 w-72 max-w-[80vw] bg-white shadow-2xl shadow-black/30 -translate-x-full transition-transform duration-200 z-50 flex flex-col">
        <div class="p-5 flex items-center justify-between border-b border-slate-100">
            <div>
                <p class="text-xs uppercase font-black text-slate-400 tracking-widest">Navegación</p>
                <p id="drawer-app-name" class="text-lg font-black text-slate-800">Diesel Ctrl</p>
            </div>
            <button id="drawer-close"
                class="h-9 w-9 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 transition">
                <i class="fas fa-xmark text-slate-500"></i>
            </button>
        </div>
        <nav class="flex-1 p-4 space-y-2 text-sm font-semibold text-slate-700"><!-- nav generado por layout-nav.js --></nav>
        <div class="p-4 border-t border-slate-100 text-xs text-slate-500">
            <p class="font-semibold">Atajos rápidos</p>
            <p class="mt-1">Presione ESC para cerrar.</p>
        </div>
    </aside>

    <main class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section class="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-4">
            <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest">Formulario</h2>
            <div class="space-y-3">
                <div class="inv-input-group">
                    <input id="c_nombre" class="inv-input font-bold" placeholder=" " />
                    <label for="c_nombre" class="inv-label">Nombre</label>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="inv-input-group">
                        <input id="c_cedula" class="inv-input font-bold" placeholder=" " />
                        <label for="c_cedula" class="inv-label">Cédula</label>
                    </div>
                    <div class="inv-input-group">
                        <input id="c_telefono" class="inv-input font-bold" placeholder=" " />
                        <label for="c_telefono" class="inv-label">Teléfono</label>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div class="inv-input-group">
                        <input id="c_descuento" class="inv-input font-bold" type="number" step="0.01" min="0" max="100" placeholder=" " />
                        <label for="c_descuento" class="inv-label">Desc. % por cliente</label>
                    </div>
                    <div class="md:col-span-2 inv-input-group">
                        <input id="c_tags" class="inv-input" placeholder=" " />
                        <label for="c_tags" class="inv-label">Tags (coma separada)</label>
                    </div>
                </div>
                <div class="inv-input-group">
                    <textarea id="c_notas" class="inv-input" rows="3" placeholder=" "></textarea>
                    <label for="c_notas" class="inv-label">Observaciones, condiciones de crédito, etc.</label>
                </div>
                <div class="flex gap-2">
                    <button id="btnGuardarCliente"
                        class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 transition-colors"><i
                            class="fas fa-save mr-2"></i>Guardar / Actualizar</button>
                    <button id="btnEliminarCliente"
                        class="bg-red-100 text-red-700 p-3 rounded-xl font-bold hover:bg-red-200 transition-colors inline-flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20" class="w-4 h-4" aria-hidden="true" focusable="false">
                                <path fill="currentColor" d="M8.78842 5.03866C8.86656 4.96052 8.97254 4.91663 9.08305 4.91663H11.4164C11.5269 4.91663 11.6329 4.96052 11.711 5.03866C11.7892 5.11681 11.833 5.22279 11.833 5.33329V5.74939H8.66638V5.33329C8.66638 5.22279 8.71028 5.11681 8.78842 5.03866ZM7.16638 5.74939V5.33329C7.16638 4.82496 7.36832 4.33745 7.72776 3.978C8.08721 3.61856 8.57472 3.41663 9.08305 3.41663H11.4164C11.9247 3.41663 12.4122 3.61856 12.7717 3.978C13.1311 4.33745 13.333 4.82496 13.333 5.33329V5.74939H15.5C15.9142 5.74939 16.25 6.08518 16.25 6.49939C16.25 6.9136 15.9142 7.24939 15.5 7.24939H15.0105L14.2492 14.7095C14.2382 15.2023 14.0377 15.6726 13.6883 16.0219C13.3289 16.3814 12.8414 16.5833 12.333 16.5833H8.16638C7.65805 16.5833 7.17054 16.3814 6.81109 16.0219C6.46176 15.6726 6.2612 15.2023 6.25019 14.7095L5.48896 7.24939H5C4.58579 7.24939 4.25 6.9136 4.25 6.49939C4.25 6.08518 4.58579 5.74939 5 5.74939H6.16667H7.16638ZM7.91638 7.24996H12.583H13.5026L12.7536 14.5905C12.751 14.6158 12.7497 14.6412 12.7497 14.6666C12.7497 14.7771 12.7058 14.8831 12.6277 14.9613C12.5495 15.0394 12.4436 15.0833 12.333 15.0833H8.16638C8.05588 15.0833 7.94989 15.0394 7.87175 14.9613C7.79361 14.8831 7.74972 14.7771 7.74972 14.6666C7.74972 14.6412 7.74842 14.6158 7.74584 14.5905L6.99681 7.24996H7.91638Z" clip-rule="evenodd" fill-rule="evenodd"></path>
                            </svg>
                            <span>Eliminar</span>
                        </button>
                </div>
                <p class="text-[11px] text-slate-500">si la cédula existe, actualiza; si no, crea.</p>
            </div>
        </section>

        <section class="lg:col-span-7 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-4">
            <div class="flex items-center justify-between gap-2">
                <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest">Clientes</h2>
                <input id="c_buscar" placeholder="Buscar por nombre o cédula"
                    class="flex-1 p-2 border rounded-lg text-sm" />
            </div>
            <div class="overflow-auto max-h-[70vh] border rounded-xl">
                <table class="w-full text-sm">
                    <thead class="bg-slate-100 text-[11px] uppercase text-slate-500">
                        <tr>
                            <th class="p-3 text-left">Nombre</th>
                            <th class="p-3 text-left">Cédula</th>
                            <th class="p-3 text-left">Teléfono</th>
                        </tr>
                    </thead>
                    <tbody id="c_tabla" class="divide-y"></tbody>
                </table>
            </div>
            <div class="mt-4">
                <h3 class="text-xs uppercase text-slate-400 font-black mb-2">Historial del cliente</h3>
                <div class="overflow-auto max-h-64 border rounded">
                    <table class="w-full text-xs">
                        <thead class="bg-slate-100 text-slate-500 uppercase">
                            <tr>
                                <th class="p-2 text-left">Fecha</th>
                                <th class="p-2 text-left">Vendedor</th>
                                <th class="p-2 text-right">Total USD</th>
                            </tr>
                        </thead>
                        <tbody id="c_historial" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer class="border-t border-slate-200 mt-8 py-4 text-center text-xs text-slate-400">
        <p id="global-footer-branding">© 2026 Diesel CTRL. Sistema de gestión de ventas.</p>
    </footer>

    <div id="toast" class="fixed right-4 bottom-4 space-y-2 z-50"></div>
    <!-- Script de navegación movido a clientes.js -->
    <script type="module" src="/js/auth-guard.js"></script>
    <script type="module" src="/js/theme.js"></script>
    <script type="module" src="/js/alerts.js"></script>
    <script type="module" src="/js/clientes.js"></script>
    <script src="/js/drawer.js"></script>
        <script src="/js/layout-nav.js"></script>
</body>

</html>
