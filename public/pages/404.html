<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Página no encontrada - Nexa CTRL</title>
    <link rel="icon" href="/img/nexa3.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles.css">
    <script src="/js/disable-autocomplete.js"></script>
</head>

<body class="notfound-body">
    <main class="notfound-main">
        <div class="card">
            <div class="orb orb--1"></div>
            <div class="orb orb--2"></div>
            <div class="orb orb--3"></div>
            <div class="orb orb--4"></div>

            <div class="error-container">
                <div class="error-code">404</div>
                <div class="error-msg">Nada que ver por aquí.</div>
                <a href="/" class="home-btn">Ir al inicio</a>
            </div>

            <div class="duck__wrapper">
                <div class="duck">
                    <div class="duck__inner">
                        <div class="duck__mouth"></div>
                        <div class="duck__head">
                            <div class="duck__eye"></div>
                            <div class="duck__white"></div>
                        </div>
                        <div class="duck__body"></div>
                        <div class="duck__wing"></div>
                    </div>
                    <div class="duck__foot duck__foot--1"></div>
                    <div class="duck__foot duck__foot--2"></div>
                </div>
                <div class="surface"></div>
            </div>
            <p id="global-footer-branding">© 2026 Nexa CTRL. Sistema de gestión de ventas.</p>
        </div>
    </main>
</body>

</html>
