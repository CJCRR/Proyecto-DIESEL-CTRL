<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Restablecer contraseña — Nexa CTRL</title>
  <link rel="icon" href="/img/nexa3.ico" />
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="min-h-screen bg-slate-950 flex items-center justify-center text-slate-900">
  <main class="w-full max-w-md px-4">
    <div class="relative">
      <div class="absolute -inset-0.5 bg-gradient-to-br from-blue-500/40 via-sky-400/30 to-indigo-500/40 rounded-3xl opacity-80 blur"></div>
      <div class="relative bg-white/95 backdrop-blur-xl rounded-3xl shadow-[0_24px_80px_rgba(15,23,42,0.85)] border border-slate-100/80 p-8">
        <div class="flex flex-col items-center mb-4">
          <div class="inline-flex items-center justify-center p-3 rounded-2xl bg-gradient-to-br from-blue-500/20 via-sky-400/10 to-indigo-500/20 ring-1 ring-blue-400/40 shadow-xl shadow-slate-900/60 mb-3">
            <img src="/img/nexa3.ico" alt="Logo Nexa CTRL" class="w-12 h-12" loading="lazy">
          </div>
          <h1 class="text-lg font-bold text-slate-900">Restablecer contraseña</h1>
          <p class="text-xs text-slate-500 mt-1 text-center">Define una nueva contraseña para tu usuario administrador.</p>
        </div>

        <div id="rp-global-error" class="hidden mb-3 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-xs flex items-start">
          <i class="fas fa-exclamation-circle mr-2 mt-0.5"></i>
          <span id="rp-global-error-text"></span>
        </div>
        <div id="rp-global-success" class="hidden mb-3 p-3 bg-emerald-50 border border-emerald-200 rounded-xl text-emerald-700 text-xs flex items-start">
          <i class="fas fa-check-circle mr-2 mt-0.5"></i>
          <span id="rp-global-success-text"></span>
        </div>

        <form id="resetForm" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-slate-600 mb-1">Nueva contraseña</label>
            <input id="rp-password" type="password" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="••••••" required minlength="6">
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-600 mb-1">Confirmar contraseña</label>
            <input id="rp-password-confirm" type="password" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="Repite la contraseña" required minlength="6">
          </div>

          <p id="rp-form-error" class="hidden text-[11px] text-red-600"></p>

          <button type="submit" id="rp-save-btn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold py-2.5 rounded-xl text-sm tracking-wide transition-all transform active:scale-95 shadow-lg shadow-blue-900/30 flex items-center justify-center gap-2">
            <i class="fas fa-key"></i>
            <span>Guardar nueva contraseña</span>
          </button>
        </form>

        <button type="button" id="rp-back-login" class="mt-4 w-full text-xs text-blue-600 hover:underline flex items-center justify-center gap-1">
          <i class="fas fa-arrow-left text-[10px]"></i>
          <span>Volver al inicio de sesión</span>
        </button>
      </div>
    </div>
  </main>

  <script type="module" src="/js/reset-password.js"></script>
</body>

</html>
