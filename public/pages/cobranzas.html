<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa CTRL - Cobranzas</title>
    <link rel="icon" href="/img/nexa3.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <main class="flex-1 container mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-4">
        <section class="lg:col-span-8 bg-white border border-slate-200 rounded-2xl shadow-sm">
            <div class="p-4 border-b bg-slate-50 flex flex-wrap gap-3 items-center justify-between">
                <div class="flex items-center gap-2 text-slate-500 text-xs font-black uppercase tracking-widest">
                    <i class="fas fa-list"></i>
                    <span>Listado</span>
                </div>
                <div class="flex gap-2 flex-wrap items-center">
                    <input id="f_buscar" class="p-2 px-3 border rounded-xl text-sm" placeholder="Buscar cliente o doc">
                    <select id="f_estado" class="p-2 px-3 border rounded-xl text-sm">
                        <option value="">Todos</option>
                        <option value="pendiente">Pendiente</option>
                        <option value="parcial">Parcial</option>
                        <option value="vencido">Vencido</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                    <select id="f_mora" class="p-2 px-3 border rounded-xl text-sm">
                        <option value="">Mora: Todas</option>
                        <option value="1">Mora ≥ 1 día</option>
                        <option value="7">Mora ≥ 7 días</option>
                        <option value="30">Mora ≥ 30 días</option>
                    </select>
                    <div class="flex items-center gap-1">
                        <button id="cob-periodo-prev" type="button" class="px-3 py-2 border rounded-xl text-[11px] text-slate-600 bg-white hover:bg-slate-50 flex items-center gap-1">
                            <i class="fas fa-chevron-left text-[9px]"></i>
                            <span>Período anterior</span>
                        </button>
                        <button id="cob-periodo-next" type="button" class="px-3 py-2 border rounded-xl text-[11px] text-slate-600 bg-white hover:bg-slate-50 flex items-center gap-1">
                            <span>Período siguiente</span>
                            <i class="fas fa-chevron-right text-[9px]"></i>
                        </button>
                        <span id="cob-periodo-label" class="hidden sm:inline text-[11px] text-slate-500 ml-1"></span>
                    </div>
                    <button id="f_refrescar"
                        class="px-3 py-2 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-700 transition">
                        <i class="fas fa-rotate"></i>
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-white text-[10px] uppercase text-slate-400 font-black border-b">
                        <tr>
                            <th class="p-3 text-left">Cliente</th>
                            <th class="p-3 text-left">Documento</th>
                            <th class="p-3 text-center">Vence</th>
                            <th class="p-3 text-right">Total $</th>
                            <th class="p-3 text-right">Saldo $</th>
                            <th class="p-3 text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuentas" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        <section class="lg:col-span-4 space-y-4">
            <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-4" id="panel-resumen">
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Resumen</div>
                <div id="resumen-totales" class="mb-3 text-[11px] text-slate-600 space-y-1"></div>
                <div class="grid grid-cols-2 gap-3" id="resumen-cards"></div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl shadow-sm" id="panel-detalle">
                <div class="p-4 border-b bg-slate-50 flex items-center justify-between">
                    <div>
                        <div class="text-[10px] font-black text-slate-400 uppercase">Detalle</div>
                        <div id="detalle-cliente" class="font-bold text-slate-800 text-sm">Seleccione una cuenta</div>
                    </div>
                    <span id="detalle-estado" class="text-xs font-black text-slate-500"></span>
                </div>
                <div class="p-4 space-y-3 text-sm">
                    <div class="flex justify-between">
                        <span class="text-slate-500">Total</span>
                        <span id="detalle-total" class="font-bold">—</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-500">Saldo</span>
                        <span id="detalle-saldo" class="font-bold">—</span>
                    </div>
                    <div class="flex justify-between text-xs text-slate-500">
                        <span>Emisión</span><span id="detalle-emision">—</span>
                    </div>
                    <div class="flex justify-between text-xs text-slate-500">
                        <span>Vencimiento</span><span id="detalle-venc">—</span>
                    </div>
                    <div class="text-xs text-slate-500" id="detalle-notas">—</div>
                    <div class="pt-2 border-t">
                        <button id="detalle-items-toggle" type="button"
                            class="w-full flex items-center justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">
                            <span>Productos vendidos</span>
                            <i class="fas fa-chevron-down text-[9px]"></i>
                        </button>
                        <div id="detalle-items" class="space-y-1 max-h-40 overflow-y-auto text-xs text-slate-600 hidden"></div>
                    </div>
                    <div>
                        <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Pagos</div>
                        <div id="detalle-pagos" class="space-y-2 max-h-48 overflow-y-auto"></div>
                    </div>
                    <div class="pt-2 border-t">
                        <div class="text-[10px] font-black text-slate-400 uppercase mb-2">Registrar pago</div>
                        <form id="form-pago" class="space-y-2">
                            <div class="grid grid-cols-2 gap-2">
                                <div class="inv-input-group">
                                    <input id="p_monto" type="number" step="0.01" min="0" class="inv-input" placeholder=" " />
                                    <label for="p_monto" class="inv-label">Monto</label>
                                </div>
                                <div>
                                    <label class="text-[11px] font-semibold text-slate-500"></label>
                                    <select id="p_moneda" class="w-full select-pos text-sm">
                                        <option value="USD">USD</option>
                                        <option value="BS">Bs</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="inv-input-group">
                                    <input id="p_tasa" type="number" step="0.01" min="0" class="inv-input" placeholder=" " />
                                    <label for="p_tasa" class="inv-label">Tasa BCV</label>
                                </div>
                                <div class="inv-input-group">
                                    <input id="p_metodo" class="inv-input" placeholder=" " />
                                    <label for="p_metodo" class="inv-label">Método</label>
                                </div>
                            </div>
                            <div class="inv-input-group">
                                <input id="p_ref" class="inv-input" placeholder=" " />
                                <label for="p_ref" class="inv-label">Referencia (opcional)</label>
                            </div>
                            <div class="inv-input-group">
                                <textarea id="p_notas" class="inv-input text-sm" rows="2" placeholder=" "></textarea>
                                <label for="p_notas" class="inv-label">Notas</label>
                            </div>
                            <button type="submit"
								class="w-full bg-emerald-600 text-white py-2 rounded-xl font-semibold hover:bg-emerald-700 transition">Guardar
								pago</button>
                        </form>
                    </div>
                    <div id="pago-info" class="text-[11px] text-amber-600"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-4 right-4 hidden px-4 py-3 rounded-xl shadow-lg text-white text-sm"></div>

    <!-- Script de navegación movido a cobranzas.js -->

    <script type="module" src="/js/auth-guard.js"></script>
    <script type="module" src="/js/theme.js"></script>
    <script src="/js/layout-shell.js"></script>
    <script type="module" src="/js/alerts.js"></script>
    <script type="module" src="/js/cobranzas.js"></script>
    <script src="/js/layout-nav.js"></script>
    <script src="/js/drawer.js"></script>
</body>

</html>
